name: Transcribe Recordings

on:
  push:
    branches: [master]
    paths:
      - "recordings/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  transcribe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      # --- Python Whisper transcription ---
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python transcription dependencies
        run: pip install -r scripts/requirements-transcribe.txt

      - name: Transcribe audio recordings
        run: python scripts/transcribe.py
        env:
          WHISPER_MODEL: ${{ vars.WHISPER_MODEL || 'base' }}

      # --- Node.js merge + announcement extraction ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install script dependencies
        working-directory: scripts
        run: npm install

      - name: Merge transcripts (Claude API)
        working-directory: scripts
        run: node merge-transcripts.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Extract announcements
        working-directory: scripts
        run: node extract-announcements.mjs

      # --- Commit outputs back to repo ---
      - name: Commit transcript outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transcripts/ site/public/announcements.json
          if git diff --cached --quiet; then
            echo "Nothing to commit — transcripts and announcements are up to date."
          else
            git commit -m "chore: add transcripts and announcements [skip ci]"
            git push
          fi
